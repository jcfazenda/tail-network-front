<div class="drawer-backdrop" (click)="close.emit()"></div>
<aside class="drawer">
  <div class="drawer__header" [style.backgroundImage]="'url(/assets/images/panel-chat.png)'">
    <div class="drawer__title">
      <h4>Conversas</h4>
      <span class="drawer__meta">{{ job.title }} · {{ job.company }} · {{ job.location }}</span>
    </div>
    <button class="icon-btn close-btn" (click)="close.emit()" aria-label="Fechar painel">×</button>
  </div>

  <div class="drawer__search">
    <span class="material-symbols-rounded">search</span>
    <input type="text" placeholder="Buscar conversa..." />
  </div>

  <div class="drawer__content">
    <div class="chat-item" *ngFor="let c of job.candidates; let i = index" [class.highlight]="i===0">
      <div class="chat-avatar" [style.backgroundImage]="'url(' + c.avatar + ')'" aria-hidden="true"></div>
      <div class="chat-body">
        <div class="chat-top">
          <span class="chat-name">{{ c.name }}</span>
          <span class="chat-badge">{{ c.role | uppercase }}</span>
          <span class="chat-status" [class.online]="c.status==='online'"></span>
          <span class="chat-actions">⋯</span>
        </div>
        <div class="chat-snippet">Tenho interesse na vaga {{ job.title }}...</div>
      </div>
      <div class="chat-meta">
        <span class="chat-match">{{ c.match }}%</span>
        <span class="chat-time">{{ c.minutesAgo }}m</span>
      </div>
    </div>
  </div>

  <div class="drawer__footer">
    <input type="text" placeholder="Digite uma mensagem..." />
    <button class="cta small" type="button">Enviar</button>
  </div>
</aside>
