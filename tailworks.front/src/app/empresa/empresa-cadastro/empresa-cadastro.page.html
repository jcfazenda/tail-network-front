<section class="empresa-cadastro">
  <header class="empresa-cadastro__hero">
    <div class="empresa-cadastro__hero-copy">
      <h1>{{ pageTitle }}</h1>
      <p>{{ pageDescription }}</p>
    </div>

    <div class="empresa-cadastro__hero-actions">
      <a class="empresa-cadastro__ghost-action" routerLink="/empresa">
        <span class="material-symbols-rounded" aria-hidden="true">arrow_back</span>
        <span>Voltar para empresas</span>
      </a>

      <button class="empresa-cadastro__primary-action" type="button" [disabled]="!canSave" (click)="saveCompany()">
        <span class="material-symbols-rounded" aria-hidden="true">save</span>
        <span>Salvar</span>
      </button>
    </div>
  </header>

  <div class="empresa-cadastro__layout">
    <form class="empresa-cadastro__form" (submit)="$event.preventDefault(); saveCompany()">
      <header class="empresa-cadastro__section-head">
        <strong>Identidade e perfil</strong>
        <span>Esses dados abastecem o cadastro, os cards e a selecao de empresa para recruiters.</span>
      </header>

      <div class="empresa-cadastro__grid empresa-cadastro__grid--identity">
        <label class="empresa-cadastro__field">
          <span>Nome</span>
          <input type="text" [(ngModel)]="draft.name" name="name" />
        </label>

        <label class="empresa-cadastro__field">
          <span>Setor</span>
          <input type="text" [(ngModel)]="draft.sector" name="sector" />
        </label>

        <label class="empresa-cadastro__field empresa-cadastro__field--select-elevated">
          <span class="empresa-cadastro__field-label empresa-cadastro__field-label--soft">Pais</span>
          <span class="empresa-cadastro__select-shell">
            <span class="empresa-cadastro__select-shell-icon material-symbols-rounded" aria-hidden="true">public</span>
            <select
              [ngModel]="selectedCountry"
              (ngModelChange)="onCountryChange($event)"
              name="country"
            >
              <option *ngFor="let country of countryOptions" [value]="country">{{ country }}</option>
            </select>
            <span class="empresa-cadastro__select-shell-chevron material-symbols-rounded" aria-hidden="true">expand_more</span>
          </span>
        </label>

        <label class="empresa-cadastro__field empresa-cadastro__field--select-elevated">
          <span class="empresa-cadastro__field-label empresa-cadastro__field-label--soft">Localidade</span>
          <span class="empresa-cadastro__select-shell">
            <span class="empresa-cadastro__select-shell-icon material-symbols-rounded" aria-hidden="true">location_on</span>
            <select
              [ngModel]="selectedState"
              (ngModelChange)="onStateChange($event)"
              name="state"
            >
              <option *ngFor="let state of stateOptions" [value]="state">{{ getStateOptionLabel(state) }}</option>
            </select>
            <span class="empresa-cadastro__select-shell-chevron material-symbols-rounded" aria-hidden="true">expand_more</span>
          </span>
        </label>

        <label class="empresa-cadastro__field empresa-cadastro__field--wide">
          <span>Descricao</span>
          <textarea rows="4" [(ngModel)]="draft.description" name="description"></textarea>
        </label>
      </div>
    </form>
  </div>
</section>
