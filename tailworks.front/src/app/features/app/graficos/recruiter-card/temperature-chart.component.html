<div class="tempChart">
  <svg [attr.viewBox]="'0 0 ' + w + ' ' + h" preserveAspectRatio="none" aria-label="Tendência">
    <defs>
      <linearGradient id="tempBand" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="rgba(59,130,246,0.12)"></stop>
        <stop offset="50%" stop-color="rgba(37,186,164,0.12)"></stop>
        <stop offset="100%" stop-color="rgba(34,197,94,0.10)"></stop>
      </linearGradient>

      <linearGradient id="tempLine" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#60a5fa"></stop>
        <stop offset="50%" stop-color="#22c55e"></stop>
        <stop offset="100%" stop-color="#0ea5e9"></stop>
      </linearGradient>

      <filter id="tempGlow" x="-40%" y="-120%" width="180%" height="340%">
        <feGaussianBlur stdDeviation="5" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>

    <!-- faixa de referência -->
    <rect [attr.x]="pad" [attr.y]="pad" [attr.width]="w - pad * 2" [attr.height]="h - pad * 2" rx="12" fill="url(#tempBand)" opacity="0.6" />

    <!-- grid -->
    <g class="grid">
      <line *ngFor="let y of [0,1,2,3]" [attr.x1]="pad" [attr.x2]="w - pad" [attr.y1]="pad + y*(h-2*pad)/3"
            [attr.y2]="pad + y*(h-2*pad)/3" />
    </g>

    <!-- área -->
    <path [attr.d]="areaPath" fill="url(#tempBand)" opacity="0.65" />

    <!-- linha -->
    <path
      [attr.d]="linePath"
      fill="none"
      stroke="url(#tempLine)"
      stroke-width="3.2"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#tempGlow)"
    />

    <!-- pontos -->
    <g *ngFor="let p of points">
      <circle [attr.cx]="p.x" [attr.cy]="p.y" r="3.2" fill="#fff" stroke="rgba(14,165,233,0.45)" stroke-width="1" />
      <circle [attr.cx]="p.x" [attr.cy]="p.y" r="1.8" fill="#0ea5e9" />
    </g>

    <!-- ponto final destacado -->
    <g *ngIf="lastPoint">
      <circle [attr.cx]="lastPoint.x" [attr.cy]="lastPoint.y" r="6" fill="rgba(255,255,255,0.95)" stroke="rgba(34,197,94,0.45)" stroke-width="1.6" />
      <circle [attr.cx]="lastPoint.x" [attr.cy]="lastPoint.y" r="3.6" fill="#22c55e" />
    </g>
  </svg>
</div>
