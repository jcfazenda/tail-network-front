<div class="candidateChatRoot" *ngIf="isOpen">
  <button class="candidateChatOverlay" type="button" (click)="close.emit()" aria-label="Fechar chat"></button>

  <aside class="candidateChatPanel" role="dialog" aria-modal="true" aria-label="Chat com recruiter">
    <header class="candidateChatHead">
      <div class="candidateChatHeadMeta">
        <div class="candidateChatEyebrow">Conversa com recruiter</div>
        <h3>{{ job?.title }}</h3>
        <p>
          {{ job?.id }} • {{ job?.company }} • {{ job?.location }} • {{ job?.type }}
        </p>
      </div>
      <button type="button" class="chatIconBtn" (click)="close.emit()" aria-label="Fechar" title="Fechar">✕</button>
    </header>

    <div class="candidateChatBody">
      <div class="candidateChatMessages" *ngIf="messages.length > 0; else emptyChat">
        <div class="candidateBubble" *ngFor="let msg of messages; trackBy: trackMsg" [class.mine]="msg.from === 'me'">
          <span
            class="candidateBubbleAvatar"
            [class.mine]="msg.from === 'me'"
            [style.background-image]="
              msg.from === 'me'
                ? 'url(' + candidateAvatarUrl + ')'
                : 'url(' + recruiterAvatarUrl + ')'
            "
            aria-hidden="true"
          ></span>
          <p>{{ msg.text }}</p>
          <span class="candidateBubbleTime">{{ msg.time }}</span>
        </div>
      </div>

      <ng-template #emptyChat>
        <div class="candidateChatEmpty">
          <b>{{ job?.recruiterName || 'Recruiter' }}</b>
          <p>Inicie uma conversa sobre esta vaga.</p>
        </div>
      </ng-template>
    </div>

    <footer class="candidateChatFoot">
      <input
        type="text"
        [(ngModel)]="draft"
        placeholder="Escreva para o recruiter..."
        (keydown.enter)="send.emit(draft); draft = ''"
        aria-label="Mensagem para recruiter"
      />
      <button type="button" class="chatSendBtn" (click)="send.emit(draft); draft = ''">Enviar</button>
    </footer>
  </aside>
</div>
