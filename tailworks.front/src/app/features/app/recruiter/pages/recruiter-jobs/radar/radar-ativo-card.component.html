<div class="tw-status-card">
  <div class="tw-status-card__aura" aria-hidden="true"></div>

  <div class="tw-status-card__top">
    <div class="tw-status-card__kicker">Aderência às principais vagas</div>
    <div class="tw-status-card__stage">{{ statusLabel }}</div>
  </div>

  <div class="tw-status-card__grid">
    <!-- ESQUERDA -->
    <div class="tw-status-card__left">
      <div class="tw-status-card__percent">{{ percent }}%</div>

      <div class="tw-status-card__bar" aria-hidden="true">
        <div class="tw-status-card__barFill" [style.width.%]="percent"></div>
      </div>

      <div class="tw-status-card__delta">
        <span class="tw-status-card__deltaUp">↑</span>
        +{{ weeklyDelta }}% esta semana
      </div>
    </div>

    <!-- MEIO -->
    <div class="tw-status-card__spark">
      <div class="tw-status-card__bubble">{{ percent }}%</div>

      <svg viewBox="0 0 360 120" preserveAspectRatio="none" aria-label="Evolução">
        <defs>
          <linearGradient id="twLineAmber" x1="0" x2="1">
            <stop offset="0" stop-color="rgba(245,158,11,.18)"></stop>
            <stop offset="1" stop-color="rgba(245,158,11,.95)"></stop>
          </linearGradient>

          <linearGradient id="twAreaAmber" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="rgba(245,158,11,.18)"></stop>
            <stop offset="1" stop-color="rgba(245,158,11,.03)"></stop>
          </linearGradient>
        </defs>

        <!-- área -->
        <path
          d="M8,92
             C40,86 58,74 84,72
             C112,70 126,58 150,60
             C178,62 196,46 220,42
             C248,38 264,44 290,30
             C316,16 330,22 352,14
             L352,110 L8,110 Z"
          fill="url(#twAreaAmber)"
        ></path>

        <!-- linha -->
        <path
          d="M8,92
             C40,86 58,74 84,72
             C112,70 126,58 150,60
             C178,62 196,46 220,42
             C248,38 264,44 290,30
             C316,16 330,22 352,14"
          fill="none"
          stroke="url(#twLineAmber)"
          stroke-width="4"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></path>

        <!-- dot final -->
        <circle cx="352" cy="14" r="6" fill="rgba(245,158,11,.95)"></circle>
        <circle cx="352" cy="14" r="12" fill="rgba(245,158,11,.12)"></circle>

        <!-- dot intermediário (pra dar aquele “ponto” no meio) -->
        <circle cx="160" cy="60" r="4.5" fill="rgba(255,255,255,.9)"></circle>
        <circle cx="160" cy="60" r="2.5" fill="rgba(245,158,11,.9)"></circle>
      </svg>

      <div class="tw-status-card__sparkMeta">
        <span class="tw-status-card__sparkUp">↗</span>
        {{ recentApplications }} candidaturas
      </div>
    </div>

  </div>
</div>
