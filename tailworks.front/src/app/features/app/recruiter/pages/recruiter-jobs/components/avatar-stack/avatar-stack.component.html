<span class="avatarStack"
      [ngStyle]="{
        '--avatar-size': size + 'px',
        '--overlap': overlapPx + 'px'
      }">
  <span class="avatarItem" *ngFor="let item of items">
    <img *ngIf="item.avatarUrl" [src]="item.avatarUrl" [alt]="item.name" (error)="onAvatarError($event)" />
    <span class="avatarFallback">{{ item.initials || 'TW' }}</span>
  </span>

  <span class="avatarItem avatarItem--more" *ngIf="extraCount > 0">+{{ extraCount }}</span>
</span>
