<section class="talentsPage">
  <header class="pageHeader">
    <div>
      <p class="eyebrow">Recruiter</p>
      <h1>Talentos (Radar)</h1>
    </div>
  </header>

  <section class="filters">
    <label>Nome/cargo
      <input [(ngModel)]="query" (ngModelChange)="reload()" placeholder="Buscar talento" />
    </label>

    <label>Local
      <input [(ngModel)]="local" (ngModelChange)="reload()" placeholder="Cidade" />
    </label>

    <label>Aderência mínima
      <input type="number" [(ngModel)]="minAderencia" (ngModelChange)="reload()" min="0" max="100" />
    </label>

    <label>Vaga para ação
      <select [(ngModel)]="selectedJobId">
        <option value="" disabled>Selecione uma vaga</option>
        <option *ngFor="let job of jobs" [value]="job.id">{{ job.titulo }} ({{ job.empresa }})</option>
      </select>
    </label>
  </section>

  <section class="talentList">
    <article class="talentCard" *ngFor="let talent of talents; trackBy: trackByTalentId">
      <div class="main">
        <h3>{{ talent.nome }}</h3>
        <p>{{ talent.cargoAtual }} • {{ talent.local }}</p>
        <small>
          Aderência média {{ talent.aderenciaMedia }}% • {{ trendLabel(talent) }}
        </small>
        <small>
          Crescimento: {{ talent.crescimento30Dias }}% (30d) / {{ talent.crescimento60Dias }}% (60d)
        </small>
      </div>

      <div class="skills">
        <span *ngFor="let skill of talent.skills">{{ skill.nome }} {{ skill.nivel }}%</span>
      </div>

      <div class="actions">
        <button type="button" (click)="inviteTalent(talent)" [disabled]="!selectedJobId">Convidar para vaga</button>
        <button type="button" (click)="startHiringRequest(talent)">Iniciar solicitação de contratação</button>
      </div>
    </article>
  </section>
</section>
