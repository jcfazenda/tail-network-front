<section class="recruiterDashboardPage">
  <header class="dashboardHeader">
    <div>
      <h1>Dashboard</h1>
      <p>Visão analítica do funil de contratação</p>
    </div>
    <div class="dashboardActions">
      <a class="dashLink" routerLink="/recruiter/vagas">Vagas</a>
      <a class="dashLink" routerLink="/recruiter/talentos">Talentos</a>
    </div>
  </header>

  <section class="dashboardAnalyticsGrid">
    <article class="dashboardAnalyticsCard">
      <recruiter-jobs-analytics
        mode="activity"
        [openJobs]="openJobsCount"
        [totalCandidates]="totalCandidatesCount"
        [inProcessCandidates]="hiringPipelineCount"
        [hiredCount]="hiredCount"
        [avgAdherenceActive]="avgAdherenceActivePercent"
        [activeCandidates]="activeCandidatesCount"
        [readyTalents]="readyTalentsCount"
        [avgTriageHours]="avgTriageHours"
        [riskCount]="riskCount"
        [activityLabels]="activityLabels"
        [activitySeries]="activitySeries"
        [funnelStages]="funnelStages"
      />
    </article>

    <article class="dashboardAnalyticsCard">
      <recruiter-jobs-analytics
        mode="kpi"
        [openJobs]="openJobsCount"
        [totalCandidates]="totalCandidatesCount"
        [inProcessCandidates]="hiringPipelineCount"
        [hiredCount]="hiredCount"
        [avgAdherenceActive]="avgAdherenceActivePercent"
        [activeCandidates]="activeCandidatesCount"
        [readyTalents]="readyTalentsCount"
        [avgTriageHours]="avgTriageHours"
        [riskCount]="riskCount"
        [activityLabels]="activityLabels"
        [activitySeries]="activitySeries"
        [funnelStages]="funnelStages"
      />
    </article>
  </section>
</section>
