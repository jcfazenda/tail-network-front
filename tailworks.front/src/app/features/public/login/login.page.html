<section class="loginScene">
  <div class="sceneGlow" aria-hidden="true"></div>

  <div class="sceneGrid">
    <article class="loginCard">
      <header class="loginHead">
        <h1>Entrar no TailWorks</h1>
        <p>Acesse seu ambiente para continuar o processo.</p>
      </header>

      <label>
        Email
        <input type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" placeholder="voce@empresa.com" />
      </label>

      <label>
        Senha
        <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" placeholder="••••••••" />
      </label>

      <button type="button" class="btnSubmit" (click)="login()">
        Entrar
      </button>

      <div class="socialDivider">
        <span>ou continue com</span>
      </div>

      <div class="socialActions">
        <button type="button" class="btnSocial btnSocial--google" (click)="loginWithProvider('google')">
          <svg class="socialIconSvg" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#EA4335" d="M12 10.2v3.9h5.4c-.2 1.3-1.5 3.9-5.4 3.9-3.3 0-5.9-2.7-5.9-6s2.6-6 5.9-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.5 14.6 2.6 12 2.6 6.9 2.6 2.8 6.7 2.8 11.8S6.9 21 12 21c6.9 0 9.1-4.8 9.1-7.3 0-.5 0-.9-.1-1.3H12z"/>
            <path fill="#4285F4" d="M21.1 12.4H12v3.9h5.4c-.3 1.4-1.7 3.6-5.4 3.6V21c4.4 0 8-3.6 8-8 0-.2 0-.4-.1-.6z"/>
            <path fill="#FBBC05" d="M4.9 14.1c-.2-.7-.3-1.4-.3-2.1s.1-1.4.3-2.1l-3.1-2.4C1.3 8.5 1 9.7 1 12s.3 3.5.8 4.5l3.1-2.4z"/>
            <path fill="#34A853" d="M12 21c2.6 0 4.7-.9 6.3-2.4l-3-2.4c-.8.5-1.9.9-3.3.9-2.5 0-4.6-1.7-5.3-4l-3.2 2.4C4.9 18.7 8.1 21 12 21z"/>
          </svg>
          <span class="socialLabel">Google</span>
        </button>
        <button type="button" class="btnSocial btnSocial--linkedin" (click)="loginWithProvider('linkedin')">
          <svg class="socialIconSvg" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="2" y="2" width="20" height="20" rx="4" fill="#0A66C2"/>
            <rect x="6.1" y="9.6" width="2.4" height="8.2" fill="#fff"/>
            <circle cx="7.3" cy="7.3" r="1.3" fill="#fff"/>
            <path fill="#fff" d="M10.3 9.6h2.3v1.1h.1c.3-.6 1.1-1.3 2.2-1.3 2.3 0 2.8 1.5 2.8 3.5v4.9h-2.4v-4.3c0-1-.02-2.3-1.4-2.3s-1.6 1.1-1.6 2.2v4.4h-2.4z"/>
          </svg>
          <span class="socialLabel">LinkedIn</span>
        </button>
      </div>
    </article>
  </div>
</section>
