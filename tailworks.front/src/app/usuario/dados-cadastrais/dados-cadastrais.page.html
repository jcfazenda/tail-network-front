<section class="candidate-profile">
  <form class="candidate-profile__form" #basicForm="ngForm" novalidate (ngSubmit)="submitBasicData(basicForm)">
      <div class="candidate-profile__form-card">
        <div class="candidate-profile__grid candidate-profile__grid--basic">
          <label class="candidate-profile__field candidate-profile__field--left">
            <span>Nome</span>
            <div class="candidate-profile__input-shell" [class.candidate-profile__input-shell--invalid]="showFieldError(nameModel)">
              <span class="material-symbols-rounded" aria-hidden="true">person</span>
              <input
                type="text"
                [(ngModel)]="profile.name"
                name="name"
                required
                placeholder="Nome"
                #nameModel="ngModel"
              />
            </div>
            <small class="candidate-profile__error" *ngIf="showFieldError(nameModel)">Informe seu nome.</small>
          </label>

          <label class="candidate-profile__field candidate-profile__field--left">
            <span>Telefone</span>
            <div class="candidate-profile__input-shell" [class.candidate-profile__input-shell--invalid]="showFieldError(phoneModel)">
              <span class="material-symbols-rounded" aria-hidden="true">call</span>
              <input
                type="text"
                [(ngModel)]="profile.phone"
                (ngModelChange)="onPhoneInput($event)"
                name="phone"
                required
                pattern="^\\(\\d{2}\\)\\s\\d\\s\\d{4}-\\d{4}$"
                inputmode="numeric"
                maxlength="16"
                placeholder="(11) 9 9999-9999"
                #phoneModel="ngModel"
              />
            </div>
            <small class="candidate-profile__error" *ngIf="showFieldError(phoneModel)">
              <ng-container *ngIf="phoneModel.errors?.['required']; else invalidPhone">Informe seu celular.</ng-container>
              <ng-template #invalidPhone>Use o formato (11) 9 9999-9999.</ng-template>
            </small>
          </label>

          <label class="candidate-profile__field candidate-profile__field--left">
            <span>Email</span>
            <div class="candidate-profile__input-shell" [class.candidate-profile__input-shell--invalid]="showFieldError(emailModel)">
              <span class="material-symbols-rounded" aria-hidden="true">mail</span>
              <input
                type="email"
                [(ngModel)]="profile.email"
                name="email"
                required
                email
                placeholder="Email"
                #emailModel="ngModel"
              />
            </div>
            <small class="candidate-profile__error" *ngIf="showFieldError(emailModel)">
              <ng-container *ngIf="emailModel.errors?.['required']; else invalidEmail">Informe seu email.</ng-container>
              <ng-template #invalidEmail>Informe um email válido.</ng-template>
            </small>
          </label>

          <label class="candidate-profile__field candidate-profile__field--right">
            <span>Estado - Cidade UF</span>
            <div class="candidate-profile__input-shell" [class.candidate-profile__input-shell--invalid]="showFieldError(stateModel)">
              <span class="material-symbols-rounded" aria-hidden="true">flag</span>
              <select [(ngModel)]="profile.state" name="state" required #stateModel="ngModel">
                <option value="" disabled>Selecione</option>
                <option *ngFor="let item of stateOptions" [value]="item.value">{{ item.label }}</option>
              </select>
              <span class="material-symbols-rounded candidate-profile__select-chevron" aria-hidden="true">expand_more</span>
            </div>
            <small class="candidate-profile__error" *ngIf="showFieldError(stateModel)">Informe o estado.</small>
          </label>

          <label class="candidate-profile__field candidate-profile__field--right">
            <span>Cidade</span>
            <div class="candidate-profile__input-shell" [class.candidate-profile__input-shell--invalid]="showFieldError(cityModel)">
              <span class="material-symbols-rounded" aria-hidden="true">location_city</span>
              <input
                type="text"
                [(ngModel)]="profile.city"
                name="city"
                required
                placeholder="Cidade"
                #cityModel="ngModel"
              />
            </div>
            <small class="candidate-profile__error" *ngIf="showFieldError(cityModel)">Informe a cidade.</small>
          </label>

          <div class="candidate-profile__grid-divider" aria-hidden="true"></div>

          <label class="candidate-profile__field candidate-profile__field--left">
            <span>GitHub / Portfólio</span>
            <div class="candidate-profile__input-shell" [class.candidate-profile__input-shell--invalid]="showFieldError(portfolioModel)">
              <span class="material-symbols-rounded" aria-hidden="true">language</span>
              <input
                type="text"
                [(ngModel)]="profile.portfolio"
                name="portfolio"
                required
                placeholder="GitHub / Portfólio"
                #portfolioModel="ngModel"
              />
            </div>
            <small class="candidate-profile__error" *ngIf="showFieldError(portfolioModel)">
              Informe seu GitHub ou portfólio.
            </small>
          </label>

          <label class="candidate-profile__field candidate-profile__field--right">
            <span>LinkedIn</span>
            <div class="candidate-profile__input-shell" [class.candidate-profile__input-shell--invalid]="showFieldError(linkedinModel)">
              <span class="material-symbols-rounded" aria-hidden="true">link</span>
              <input
                type="text"
                [(ngModel)]="profile.linkedin"
                name="linkedin"
                required
                placeholder="LinkedIn"
                #linkedinModel="ngModel"
              />
            </div>
            <small class="candidate-profile__error" *ngIf="showFieldError(linkedinModel)">Informe seu LinkedIn.</small>
          </label>
        </div>

      </div>
    </form>
</section>
