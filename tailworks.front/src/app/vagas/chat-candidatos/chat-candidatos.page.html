<section class="left-sidebar">
  <div class="left-sidebar__top">
    <button class="left-sidebar__tiny-icon" type="button" aria-label="Perfil">
      <span class="material-symbols-rounded">person</span>
    </button>

    <button class="left-sidebar__tiny-icon" type="button" aria-label="Mais opções">
      <span class="material-symbols-rounded">more_horiz</span>
    </button>
  </div>

  <div class="left-sidebar__profile">
    <div class="left-sidebar__avatar-wrap">
      <div class="left-sidebar__avatar-ring">
        <img [src]="profile.avatar" [alt]="profile.name" class="left-sidebar__avatar" />
      </div>

      <span class="left-sidebar__badge">{{ profile.unreadCount }}</span>
    </div>

    <strong>{{ profile.name }}</strong>
    <span>{{ profile.email }}</span>
  </div>

  <div class="left-sidebar__menu-grid">
    <button
      *ngFor="let item of menuItems; trackBy: trackByMenuItem"
      type="button"
      class="left-sidebar__menu-item"
      [class.left-sidebar__menu-item--active]="item.active"
      [attr.aria-label]="item.label"
    >
      <span class="left-sidebar__menu-notify" *ngIf="item.notify"></span>

      <span class="material-symbols-rounded left-sidebar__menu-icon">
        {{ item.icon }}
      </span>

      <small>{{ item.label }}</small>
    </button>
  </div>

  <div class="left-sidebar__footer-links">
    <button type="button" class="left-sidebar__footer-link">
      <span class="material-symbols-rounded">chat</span>
      <span>Send Feedback</span>
      <span class="material-symbols-rounded">arrow_forward</span>
    </button>

    <button type="button" class="left-sidebar__footer-link">
      <span class="material-symbols-rounded">help</span>
      <span>Knowledge Base</span>
      <span class="material-symbols-rounded">arrow_forward</span>
    </button>
  </div>
</section>
