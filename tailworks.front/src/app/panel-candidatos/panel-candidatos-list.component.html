<!-- Painel completo: topo da vaga + lista de candidatos -->
<ng-container *ngIf="selectedJobPanel; else funnelEmpty">
  <div class="job-sheet">
    <div class="job-sheet__topcard">
      <button class="panel-close-btn" type="button" (click)="closePanel()">close</button>
      <div class="job-sheet__profile">
        <div class="job-sheet__avatar"></div>
        <div class="job-sheet__profile-text">
          <div class="job-sheet__profile-name">Rafael Souza</div>
          <div class="job-sheet__profile-role">Talent Acquisition</div>
        </div>
      </div>
      <div class="job-sheet__title-row">
        <div class="job-sheet__title">{{ selectedJobPanel.title }}</div>
        <div class="job-sheet__icon">settings</div>
      </div>
      <div class="job-sheet__meta">
        <div class="job-sheet__meta-left">
          <span class="job-sheet__item">{{ selectedJobPanel.company }}</span>
        </div>
        <div class="job-sheet__meta-right">
          <span class="job-sheet__item">{{ selectedJobPanel.workModel | uppercase }}</span>
        </div>
        <div class="job-sheet__meta-bottom">
          <span class="job-sheet__item">{{ selectedJobPanel.location }} 📍</span>
        </div>
      </div>
    </div>
  </div>
  <div class="cand-list">
    <div class="candidate-divider">
      <span>Candidatos no radar</span>
    </div>
    <ng-container *ngIf="sortedCandidatesFor(selectedJobPanel) as list">
      <ng-container *ngFor="let c of list; let i = index">
        <div class="stage-gap" *ngIf="i > 0 && c.stage !== list[i-1].stage"></div>
        <button
          type="button"
          class="candidate-card"
          (click)="handleOpenChat(i)"
        >
          <span class="cand-chat" title="Abrir chat" aria-hidden="true">
            <span class="cand-chat__badge" *ngIf="i % 2 === 0">{{ (i % 3 === 0) ? 3 : (i % 3 === 1 ? 1 : 2) }}</span>
            <svg viewBox="0 0 24 24" role="presentation" focusable="false">
              <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"></path>
            </svg>
          </span>
          <div class="cand-body">
            <div class="cand-main">
              <span class="cand-avatar" [style.backgroundImage]="'url(' + c.avatar + ')'" ></span>
              <div class="cand-text">
                <div class="cand-name" style="font-size:13px;">{{ c.name }}</div>
                <div class="cand-role">{{ c.role }}</div>
              </div>
            </div>
            <div class="cand-progress">
              <div class="cand-status-chip" [ngClass]="'stage-' + (c.stage || 'processo')">
                <span>{{ stageLabel(c.stage) }}</span>
              </div>
              <div class="cand-bar-wrap">
                <div class="cand-bar" [ngClass]="'stage-' + (c.stage || 'processo')">
                  <div class="cand-bar-fill" [style.width.%]="c.match" [ngClass]="'stage-' + (c.stage || 'processo')"></div>
                </div>
                <span class="cand-bar-val">{{ c.match }}%</span>
              </div>
            </div>
          </div>
        </button>
      </ng-container>
    </ng-container>
  </div>
</ng-container>
<ng-template #funnelEmpty>
  <div class="empty">Clique em uma vaga para ver candidatos.</div>
</ng-template>
