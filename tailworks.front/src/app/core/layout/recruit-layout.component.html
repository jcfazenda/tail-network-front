<div class="recruitLayout">
  <div class="recruitBody">
    <main class="recruitMain">
      <button
        type="button"
        class="recruitTopMenuMask"
        *ngIf="isSidebarOpen"
        (click)="closeSidebar()"
        aria-label="Fechar menu de administração"
      ></button>

      <nav class="recruitTopMenu" aria-label="Menu Recruiter">
        <button type="button" class="recruitTopMenuToggle" (click)="toggleSidebar()" aria-label="Abrir menu de administração">
          <span class="material-symbols-rounded recruitTopMenuAdminIcon" aria-hidden="true">admin_panel_settings</span>
          <span class="recruitTopMenuLabel">Administração</span>
          <span class="material-symbols-rounded recruitTopMenuChevron" aria-hidden="true">
            {{ isSidebarOpen ? 'expand_less' : 'expand_more' }}
          </span>
        </button>

        <div class="recruitTopMenuPanel" *ngIf="isSidebarOpen">
          <a
            routerLink="/recruiter/vagas"
            routerLinkActive="active"
            ariaCurrentWhenActive="page"
            class="navItem"
            (click)="closeSidebar()"
          >
            <span class="navIcon material-symbols-rounded" aria-hidden="true">work</span>
            <span>Vagas</span>
          </a>

          <a
            routerLink="/recruiter"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            ariaCurrentWhenActive="page"
            class="navItem"
            (click)="closeSidebar()"
          >
            <span class="navIcon material-symbols-rounded" aria-hidden="true">dashboard</span>
            <span>Dashboard</span>
          </a>

          <a
            routerLink="/recruiter/talentos"
            routerLinkActive="active"
            ariaCurrentWhenActive="page"
            class="navItem"
            (click)="closeSidebar()"
          >
            <span class="navIcon material-symbols-rounded" aria-hidden="true">groups</span>
            <span>Talentos</span>
          </a>
        </div>
      </nav>

      <div class="recruitContentFrame">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
