<header class="topbar">
  <div class="search">
    <span class="material-symbols-rounded" aria-hidden="true">search</span>
    <input type="search" placeholder="Buscar" aria-label="Buscar talentos ou vagas" />
  </div>

  <div class="metric-bar">
    <div class="metric-item">
      <img src="/assets/images/icons-talentos-radar.png" alt="" class="metric-item__icon">
      <span class="metric-item__label">Talentos</span>
      <span class="metric-item__value">12.482</span>
    </div>
    <div class="metric-item">
      <img src="/assets/images/icon-empresas-ativas.png" alt="" class="metric-item__icon">
      <span class="metric-item__label">Empresas</span>
      <span class="metric-item__value">+3 sem</span>
    </div>
    <div class="metric-item">
      <img src="/assets/images/icon-contratacoes-mes.png" alt="" class="metric-item__icon">
      <span class="metric-item__label">Contratações</span>
      <span class="metric-item__value">54 mês</span>
    </div>
  </div>

  <div class="actions">
    <button class="iconBtn" aria-label="Notificações">
      <span class="material-symbols-rounded">notifications</span>
    </button>
    <div class="avatar" aria-label="Perfil"></div>
  </div>
</header>
