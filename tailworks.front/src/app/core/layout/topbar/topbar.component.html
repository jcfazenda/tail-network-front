<header class="topbar">
  <div class="topbar__primary">
    <div class="search">
      <span class="material-symbols-rounded" aria-hidden="true">search</span>
      <input type="search" placeholder="Buscar" aria-label="Buscar talentos ou vagas" />
    </div>

    <a class="topbar__cta" routerLink="/vagas/cadastro" aria-label="Abrir vaga">
      <span class="material-symbols-rounded" aria-hidden="true">add</span>
      <span>Abrir Vaga</span>
    </a>

    <button class="topbar__cta topbar__cta--clear" type="button" (click)="clearPublishedJobsForTesting()" aria-label="Limpar testes">
      <span class="material-symbols-rounded" aria-hidden="true">ink_eraser</span>
      <span>Limpar Testes</span>
    </button>
  </div>

  <div class="actions">
    <button class="iconBtn" aria-label="Notificações">
      <span class="material-symbols-rounded">notifications</span>
    </button>
    <div class="avatar" aria-label="Perfil"></div>
  </div>
</header>
