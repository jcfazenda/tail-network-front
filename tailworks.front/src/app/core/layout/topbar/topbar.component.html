<header class="topbar">
  <div class="search">
    <span class="material-symbols-rounded" aria-hidden="true">search</span>
    <input type="search" placeholder="Buscar" aria-label="Buscar talentos ou vagas" />
  </div>

  <div class="topbar-metrics">
    <div class="metric">
      <div class="metric__pill">Talentos no radar</div>
      <div class="metric__value">12.482</div>
    </div>
    <div class="metric">
      <div class="metric__pill">Empresas ativas</div>
      <div class="metric__value">128</div>
    </div>
    <div class="metric">
      <div class="metric__pill">Contratações este mês</div>
      <div class="metric__value">54</div>
    </div>
  </div>

  <div class="actions">
    <button class="iconBtn" aria-label="Notificações">
      <span class="material-symbols-rounded">notifications</span>
    </button>
    <div class="avatar" aria-label="Perfil"></div>
  </div>
</header>
