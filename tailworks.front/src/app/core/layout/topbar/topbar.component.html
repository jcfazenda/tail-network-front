<header class="topbar" *ngIf="!isSelectionMode">
  <div *ngIf="showSidebarProfileInPrimary" class="topbar__profile">
    <input
      #topbarAvatarInput
      class="topbar__avatar-input"
      type="file"
      accept=".jpg,.jpeg,.png,.gif,.webp"
      (change)="onTopbarAvatarSelected($event)"
    />

    <button
      class="topbar__avatar-trigger"
      type="button"
      (click)="toggleAvatarMenu($event)"
      aria-label="Abrir menu do avatar"
      title="Abrir menu do avatar"
    >
      <div
        class="avatar topbar__avatar"
        [class.avatar--candidate]="isCandidateMode"
        [class.avatar--image]="!!topbarProfileAvatarUrl"
        [style.backgroundImage]="topbarProfileAvatarUrl ? 'url(' + topbarProfileAvatarUrl + ')' : null"
        aria-hidden="true"
      >
        <span *ngIf="!topbarProfileAvatarUrl">{{ topbarProfileAvatarInitials }}</span>
      </div>
    </button>

    <div
      class="topbar__avatar-menu"
      *ngIf="avatarMenuOpen"
      (click)="$event.stopPropagation()"
    >
      <button
        class="topbar__avatar-menu-item"
        type="button"
        (click)="openTopbarAvatarPicker(topbarAvatarInput, $event)"
      >
        Alterar Foto
      </button>
      <button
        class="topbar__avatar-menu-item"
        type="button"
        (click)="openSidebarFromAvatarMenu($event)"
      >
        Menu
      </button>
    </div>

    <button
      class="topbar__profile-copy topbar__profile-copy-button"
      type="button"
      (click)="toggleSidebar()"
      aria-label="Abrir sidebar"
    >
      <span class="topbar__profile-name">{{ topbarProfileDisplayName }}</span>
      <span class="topbar__profile-meta">{{ topbarProfileDisplayMeta }}</span>
    </button>
  </div>

  <div class="topbar__actions">
    <button
      *ngIf="isCandidateEcosystem"
      class="topbar__shortcut topbar__shortcut--candidate"
      type="button"
      (click)="openCandidateProfileSetup()"
      aria-label="Configurar perfil"
    >
      configurar
    </button>

    <button
      *ngIf="isTemplateLanding"
      class="topbar__shortcut"
      type="button"
      (click)="openCreateJob()"
      aria-label="Criar vaga"
    >
      criar
    </button>

    <button class="topbar__icon" type="button" aria-label="Buscar">
      <span class="material-symbols-rounded" aria-hidden="true">search</span>
    </button>

    <button
      class="topbar__icon topbar__icon--notifications"
      type="button"
      aria-label="Notificações"
      (click)="openNotifications()"
    >
      <span class="material-symbols-rounded" aria-hidden="true">notifications</span>
      <span class="topbar__notifications-badge" *ngIf="unreadTalentNotifications > 0">
        {{ unreadTalentNotifications }}
      </span>
    </button>
  </div>
</header>
