<header class="topbar">
  <div class="topbar__primary" *ngIf="!isSelectionMode; else selectionTopbar">
    <div class="search">
      <span class="material-symbols-rounded" aria-hidden="true">search</span>
      <input
        type="search"
        [placeholder]="isCandidateMode ? 'Buscar vagas' : 'Buscar'"
        [attr.aria-label]="isCandidateMode ? 'Buscar vagas' : 'Buscar talentos ou vagas'"
      />
    </div>

    <a
      *ngIf="isCandidateEcosystem"
      class="topbar__cta topbar__cta--back"
      routerLink="/usuario/dados-cadastrais/experiencia"
      aria-label="Voltar"
    >
      <span class="material-symbols-rounded" aria-hidden="true">arrow_back</span>
      <span>Voltar</span>
    </a>

    <a *ngIf="!isCandidateMode" class="topbar__cta" routerLink="/vagas/cadastro" aria-label="Abrir vaga">
      <span class="material-symbols-rounded" aria-hidden="true">add</span>
      <span>Abrir Vaga</span>
    </a>

    <a
      *ngIf="isCandidateMode && !isCandidateEcosystem"
      class="topbar__cta topbar__cta--ecosystem"
      routerLink="/usuario/ecossistema"
      aria-label="Ir para Ecossistema"
    >
      <span class="material-symbols-rounded" aria-hidden="true">hub</span>
      <span>Ecossistema</span>
    </a>

    <button
      *ngIf="!isCandidateMode"
      class="topbar__cta topbar__cta--clear"
      type="button"
      (click)="clearPublishedJobsForTesting()"
      aria-label="Limpar testes"
    >
      <span class="material-symbols-rounded" aria-hidden="true">ink_eraser</span>
      <span>Limpar Testes</span>
    </button>
  </div>

  <div class="actions">
    <button class="iconBtn" aria-label="Notificações">
      <span class="material-symbols-rounded">notifications</span>
    </button>
    <div class="avatar" aria-label="Perfil"></div>
  </div>
</header>

<ng-template #selectionTopbar>
  <div class="topbar__primary">
    <div class="search">
      <span class="material-symbols-rounded" aria-hidden="true">door_open</span>
      <input type="search" value="Escolha seu acesso" aria-label="Escolha seu acesso" readonly />
    </div>
  </div>
</ng-template>
