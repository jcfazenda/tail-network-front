<aside class="sidebar" [class.sidebar--overlay]="overlayMode()">
  <div class="brand">
    <ng-container *ngIf="isProfileSidebarMode; else defaultBrand">
      <div class="brandCandidate">
        <input
          #sidebarAvatarInput
          class="brandAvatarInput"
          type="file"
          accept=".jpg,.jpeg,.png,.gif,.webp"
          (change)="onSidebarAvatarSelected($event)"
        />

        <button
          class="brandAvatarButton"
          type="button"
          (click)="openSidebarAvatarPicker(sidebarAvatarInput)"
          [attr.aria-label]="isCandidateMode ? 'Trocar foto do perfil' : 'Esconder sidebar'"
          [title]="isCandidateMode ? 'Trocar foto do perfil' : 'Esconder sidebar'"
        >
          <div
            class="brandAvatar"
            [class.brandAvatar--image]="!!sidebarAvatarUrl"
            [style.backgroundImage]="sidebarAvatarUrl ? 'url(' + sidebarAvatarUrl + ')' : null"
            [attr.aria-label]="sidebarDisplayName"
          >
            <span *ngIf="!sidebarAvatarUrl">{{ sidebarDisplayInitials }}</span>
          </div>
        </button>

        <div class="brandCandidate__copy">
          <strong>{{ sidebarDisplayName }}</strong>
          <span>{{ sidebarDisplayMeta }}</span>
        </div>
      </div>
    </ng-container>

    <ng-template #defaultBrand>
      <img src="/assets/images/logo-tail.png" alt="TailWorks" class="brandImg" />
    </ng-template>
  </div>

  <ng-container *ngIf="isProfileSidebarMode; else flatMenu">
    <nav
      class="menu menu--tree"
      [attr.aria-label]="isCandidateMode ? 'Navegacao do talento' : 'Navegacao do recruiter'"
    >
      <section class="menuTree__group" *ngFor="let group of sidebarTreeGroups">
        <strong class="menuTree__groupLabel">{{ group.label }}</strong>

        <div class="menuTree__branch">
          <ng-container *ngFor="let item of group.items">
            <a
              *ngIf="item.route; else placeholderItem"
              class="menuTree__item"
              [class.menuTree__item--active]="isCandidateTreeItemActive(item)"
              [routerLink]="item.route"
              [queryParams]="item.queryParams ?? null"
              (click)="handleTreeItemClick(item)"
            >
              <span class="material-symbols-rounded menuTree__icon" aria-hidden="true">{{ item.icon }}</span>
              <span class="menuTree__itemLabel">{{ item.label }}</span>
            </a>

            <ng-template #placeholderItem>
              <div class="menuTree__item menuTree__item--placeholder">
                <span class="material-symbols-rounded menuTree__icon" aria-hidden="true">{{ item.icon }}</span>
                <span class="menuTree__itemLabel">{{ item.label }}</span>
              </div>
            </ng-template>
          </ng-container>
        </div>
      </section>
    </nav>
  </ng-container>

  <ng-template #flatMenu>
    <nav class="menu" [class.menu--candidate]="isCandidateMode">
      <a
        *ngFor="let item of items"
        class="menuItem"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: isExactRoute(item) }"
        (click)="handleFlatItemClick(item)"
      >
        <span class="activeBar" aria-hidden="true"></span>
        <span class="material-symbols-rounded icon" aria-hidden="true">{{ item.icon }}</span>
        <span class="label">{{ item.label }}</span>
      </a>
    </nav>
  </ng-template>
  <div class="profileFooter">
    <div class="divider"></div>
    <div class="profileRow flat">
      <div class="avatar" aria-hidden="true"></div>
      <div class="profileMeta">
        <b>{{ profileName }}</b>
        <span>{{ profileRole }}</span>
      </div>
    </div>
    <div class="footer-msg" aria-label="Notificações">
      {{ footerMessage }}
    </div>
  </div>

  <div class="sidebarFooterBrand" aria-hidden="true">
    <img src="/assets/images/logo-tail.png" alt="" class="sidebarFooterBrand__image" />
    <span class="sidebarFooterBrand__copyright">All rights reserved © 2026</span>
  </div>
</aside>
