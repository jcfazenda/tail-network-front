<aside class="sidebar">
  <div class="brand">
    <img src="/assets/images/logo-tail.png" alt="TailWorks" class="brandImg" />
  </div>

  <nav class="menu" [class.menu--candidate]="isCandidateMode">
    <a
      *ngFor="let item of items"
      class="menuItem"
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: isExactRoute(item) }"
    >
      <span class="activeBar" aria-hidden="true"></span>
      <span class="material-symbols-rounded icon" aria-hidden="true">{{ item.icon }}</span>
      <span class="label">{{ item.label }}</span>
    </a>
  </nav>

  <div class="profileActions">
    <img src="/assets/avatars/avatares-subindo.png" alt="" aria-hidden="true" class="eco-illustration" />
    <a class="cta eco-btn" routerLink="/usuario/ecossistema" aria-label="Explorar ecossistema">Ecossistema</a>
  </div>

  <div class="profileFooter">
    <div class="divider"></div>
    <div class="profileRow flat">
      <div class="avatar" aria-hidden="true"></div>
      <div class="profileMeta">
        <b>{{ profileName }}</b>
        <span>{{ profileRole }}</span>
      </div>
    </div>
    <div class="footer-msg" aria-label="Notificações">
      {{ footerMessage }}
    </div>
  </div>
</aside>
