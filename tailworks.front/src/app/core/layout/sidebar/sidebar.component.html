<aside class="sidebar">
  <div class="brand">
    <img src="/assets/images/logo-tail.png" alt="TailWorks" class="brandImg" />
  </div>

  <nav class="menu">
    <a
      *ngFor="let item of items"
      class="menuItem"
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.route === '/vagas' }"
    >
      <span class="activeBar" aria-hidden="true"></span>
      <span class="material-symbols-rounded icon" aria-hidden="true">{{ item.icon }}</span>
      <span class="label">{{ item.label }}</span>
    </a>
  </nav>

  <div class="profileCard">
    <div class="profileRow">
      <div class="avatar" aria-hidden="true"></div>
      <div class="profileMeta">
        <b>Rafael Souza</b>
        <span>Talent Acquisition</span>
      </div>
    </div>
    <button class="cta">Recorrer Base</button>
  </div>
</aside>
