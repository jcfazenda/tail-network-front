<app-topbar aria-label="Topbar"></app-topbar>

<main class="landing">
  <section class="landing__panel" aria-label="Ecossistema">
    <div class="landing__panel-art">
      <p class="landing__panel-copy">AQUI TALENTO NAO PAGA PARA APARECER!</p>
    </div>

    <div class="landing__mobile-strip">
      <div
        #hiredTrack
        class="landing__mobile-track"
        (scroll)="onHiredScroll()"
      >
        <div
          *ngFor="let page of mobileHiredPages; let pageIndex = index"
          class="landing__mobile-page"
        >
        <div
          *ngFor="let card of page; trackBy: trackByHiredCard; let cardIndex = index"
          class="landing__mobile-card-shell"
        >
            <span
              class="landing__mobile-tape"
              aria-hidden="true"
              [style.--tape-tilt]="mobileTapeTilt(pageIndex, cardIndex, card.name + card.company + card.roleTitle)"
            ></span>

            <article
              class="hired-card landing__mobile-card"
              [style.--polaroid-tilt]="mobilePolaroidTilt(pageIndex, cardIndex, card.name + card.company + card.roleTitle)"
            >
              <div class="hired-card__photo">
                <img class="hired-card__photo-img" [src]="card.avatarUrl" [alt]="card.name" loading="eager" decoding="async" />
              </div>

              <div class="hired-card__caption">
                <div class="hired-card__name">{{ card.name }}</div>
                <div class="hired-card__role">{{ card.roleTitle }}</div>

                <div class="hired-card__company">
                  <img class="hired-card__company-logo" [src]="card.companyLogoUrl" [alt]="card.company" loading="eager" decoding="async" />
                  <span class="hired-card__company-name">{{ card.company }}</span>
                </div>
              </div>

              <div class="hired-card__chips">
                <span
                  *ngFor="let stack of card.stacks"
                  class="hired-card__chip"
                  [class.hired-card__chip--dark]="stack.tone === 'dark'"
                  [class.hired-card__chip--accent]="stack.tone === 'accent'"
                >
                  {{ stack.label }}
                </span>
              </div>
            </article>
          </div>
        </div>
      </div>
    </div>

    <section class="landing__mobile-radar" aria-label="Stacks mais contratadas">
      <div class="landing__mobile-radar-head">
        <span class="landing__mobile-radar-delta">+ {{ radarDelta }} contratacoes desde ontem</span>
      </div>
      <div class="landing__mobile-radar-bars">
        <div
          *ngFor="let category of radarCategories; trackBy: trackByRadarCategory"
          class="landing__mobile-radar-row"
        >
          <div class="landing__mobile-radar-label">
            <span
              class="landing__mobile-radar-dot"
              [style.background]="radarDotColor(category.value)"
            ></span>
            <span>{{ category.label }}</span>
          </div>

          <div class="landing__mobile-radar-track">
            <span
              class="landing__mobile-radar-fill"
              [style.width.%]="category.value"
              [style.background]="radarBarFill(category.value)"
            ></span>
          </div>

          <strong class="landing__mobile-radar-value">{{ category.value }}%</strong>
        </div>
      </div>
    </section>
  </section>
</main>
