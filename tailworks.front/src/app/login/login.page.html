<section class="login-page">
  <div class="login-page__panel">
    <div class="login-page__brand">
      <img src="/assets/images/logo-tail.png" alt="TailWorks" class="login-page__logo" />
    </div>

    <div class="login-page__copy">
      <h1>Entre para acessar a plataforma.</h1>
      <p>Use seu acesso para continuar e escolher como deseja navegar no sistema.</p>
    </div>

    <div class="login-page__socials">
      <button class="login-page__button login-page__button--social login-page__button--google" type="button" (click)="login()">
        <span class="login-page__social-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="presentation" focusable="false">
            <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-.9 2.4-1.9 3.2l3.1 2.4c1.8-1.7 2.9-4.1 2.9-7 0-.7-.1-1.4-.2-2H12z"/>
            <path fill="#34A853" d="M12 21c2.6 0 4.8-.9 6.4-2.4l-3.1-2.4c-.9.6-2 .9-3.3.9-2.5 0-4.6-1.7-5.4-4H3.4v2.5A9.7 9.7 0 0 0 12 21z"/>
            <path fill="#4A90E2" d="M6.6 13.1a5.8 5.8 0 0 1 0-3.7V6.9H3.4a9.7 9.7 0 0 0 0 8.7l3.2-2.5z"/>
            <path fill="#FBBC05" d="M12 6.8c1.4 0 2.6.5 3.5 1.3l2.6-2.6A9.7 9.7 0 0 0 3.4 6.9l3.2 2.5c.8-2.3 2.9-4 5.4-4z"/>
          </svg>
        </span>
        <span>Entrar com Google</span>
      </button>

      <button class="login-page__button login-page__button--social login-page__button--linkedin" type="button" (click)="login()">
        <span class="login-page__social-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="presentation" focusable="false">
            <path fill="currentColor" d="M6.98 8.5a1.74 1.74 0 1 1 0-3.48 1.74 1.74 0 0 1 0 3.48ZM5.5 18.5V10h2.96v8.5H5.5Zm4.64 0V10h2.84v1.16h.04c.4-.75 1.37-1.54 2.82-1.54 3.02 0 3.58 1.99 3.58 4.58v4.3h-2.96v-3.8c0-.91-.02-2.08-1.27-2.08-1.28 0-1.47 1-1.47 2.01v3.87h-2.98Z"/>
          </svg>
        </span>
        <span>Entrar com Linkedin</span>
      </button>
    </div>

    <div class="login-page__divider" aria-hidden="true">
      <span></span>
      <strong>ou</strong>
      <span></span>
    </div>

    <div class="login-page__form">
      <label class="login-page__field">
        <span>E-mail</span>
        <input type="email" [(ngModel)]="email" placeholder="voce@tailworks.com" />
      </label>

      <label class="login-page__field">
        <span>Senha</span>
        <input type="password" [(ngModel)]="password" placeholder="Digite sua senha" />
      </label>

      <div class="login-page__actions">
        <button class="login-page__button login-page__button--primary" type="button" (click)="login()">
          Entrar
        </button>
      </div>
    </div>
  </div>
</section>
